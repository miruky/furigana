<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="漢字かな交じり文にふりがなを自動付与するツール。形態素解析をブラウザ内で完結し、文章を外部に送らない"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>furigana | ふりがな自動付与</title>
    <script>
      // 描画前にテーマを確定してちらつきを防ぐ。system のときは属性を付けず
      // CSS の prefers-color-scheme に委ねる。
      (() => {
        try {
          const t = localStorage.getItem('furigana:theme');
          if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
        } catch (_) {
          /* localStorage が使えなくても既定で動く */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>このツールはブラウザ内で形態素解析を行うため、JavaScriptが必要です。</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
