<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" role="img" aria-labelledby="t d">
  <title id="t">furiganaのアーキテクチャ図</title>
  <desc id="d">辞書(public/dict)と本文(textarea)を入力に、tokenizer・kana/romaji・align/annotateで解析し、ルビHTML・括弧書き・かな文・ローマ字・分かち書きの5形式を出力する。すべてブラウザ内で完結する。</desc>
  <style>
    svg {
      --ink: #24262b;
      --accent: #2f5aa6;
      color: var(--ink);
      font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      svg { --ink: #e8e6e1; --accent: #80a8e8; }
    }
    .panel { fill: none; stroke: currentColor; stroke-opacity: 0.22; stroke-width: 1; }
    .core { fill: none; stroke: var(--accent); stroke-width: 1.3; }
    .kicker { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; fill: var(--accent); }
    .label { font-size: 14px; font-weight: 600; fill: currentColor; }
    .mono { font-family: 'SF Mono', Menlo, monospace; font-size: 12.5px; font-weight: 600; fill: currentColor; }
    .note { font-size: 11.5px; fill: currentColor; opacity: 0.6; }
    .chip-label { font-size: 12.5px; font-weight: 600; fill: currentColor; text-anchor: middle; }
    .flow { stroke: currentColor; stroke-opacity: 0.4; stroke-width: 1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="currentColor" stroke-opacity="0.4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 入力 -->
  <text x="40" y="40" class="kicker">INPUT</text>
  <rect x="40" y="52" width="372" height="78" rx="7" class="panel"/>
  <text x="58" y="82" class="label">辞書 <tspan class="mono">public/dict</tspan></text>
  <text x="58" y="104" class="note">IPAdic 約17MB(.dat.gz)。kuromojiから複製し</text>
  <text x="58" y="120" class="note">初回だけブラウザがfetchする</text>

  <rect x="428" y="52" width="372" height="78" rx="7" class="panel"/>
  <text x="446" y="82" class="label">本文 <tspan class="mono">textarea</tspan></text>
  <text x="446" y="104" class="note">localStorageに保存。250ミリ秒待ち合わせて</text>
  <text x="446" y="120" class="note">行ごとに解析する</text>

  <path d="M 226 130 L 226 162" class="flow"/>
  <path d="M 614 130 L 614 162" class="flow"/>

  <!-- 解析 -->
  <text x="40" y="158" class="kicker">ANALYZE</text>
  <rect x="40" y="166" width="760" height="120" rx="8" class="core"/>
  <rect x="58" y="184" width="226" height="84" rx="6" class="panel"/>
  <text x="74" y="210" class="mono">tokenizer.ts</text>
  <text x="74" y="231" class="note">kuromojiで行ごとに</text>
  <text x="74" y="247" class="note">形態素へ。表層形と読み</text>

  <rect x="307" y="184" width="226" height="84" rx="6" class="panel"/>
  <text x="323" y="210" class="mono">kana.ts / romaji.ts</text>
  <text x="323" y="231" class="note">読みをひらがなに正規化</text>
  <text x="323" y="247" class="note">ヘボン式ローマ字へ変換</text>

  <rect x="556" y="184" width="226" height="84" rx="6" class="panel"/>
  <text x="572" y="210" class="mono">align / annotate.ts</text>
  <text x="572" y="231" class="note">かなを手がかりに漢字の</text>
  <text x="572" y="247" class="note">連へ読みを割り当てる</text>

  <path d="M 284 226 L 307 226" class="flow"/>
  <path d="M 533 226 L 556 226" class="flow"/>

  <path d="M 420 286 L 420 318" class="flow"/>

  <!-- 出力 -->
  <text x="40" y="314" class="kicker">OUTPUT・5形式</text>
  <rect x="40" y="324" width="142" height="40" rx="6" class="panel"/>
  <text x="111" y="349" class="chip-label">ルビHTML</text>
  <rect x="194" y="324" width="142" height="40" rx="6" class="panel"/>
  <text x="265" y="349" class="chip-label">括弧書き</text>
  <rect x="348" y="324" width="142" height="40" rx="6" class="panel"/>
  <text x="419" y="349" class="chip-label">かな文</text>
  <rect x="502" y="324" width="142" height="40" rx="6" class="panel"/>
  <text x="573" y="349" class="chip-label">ローマ字</text>
  <rect x="656" y="324" width="144" height="40" rx="6" class="panel"/>
  <text x="728" y="349" class="chip-label">分かち書き</text>
</svg>
